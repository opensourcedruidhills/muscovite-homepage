<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muscovite — Coming Soon</title>
  <meta name="description" content="Muscovite: Business intent to software system compiler. Coming soon.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(42,157,143,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(45,106,79,0.10) 0%, transparent 60%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #c9d1d9;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 680px;
    }

    .logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #2a9d8f;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      color: #e9c46a;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .tagline strong {
      color: #c9d1d9;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #2a9d8f, #e76f51);
      border: none;
      border-radius: 2px;
      margin: 0 auto 3rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #2a9d8f;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(42,157,143,0.3);
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .links a:hover {
      background: rgba(42,157,143,0.1);
      border-color: #2a9d8f;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Muscovite</div>
    <h1>Coming Soon</h1>
    <hr class="divider">
    <p class="tagline">
      <strong>Business intent to software system compiler.</strong><br>
      Muscovite compiles domain models into complete, deployable software systems —
      PostgreSQL, C++, gRPC, Qt, and CMake — from a single specification.
    </p>
    <div class="links">
      <a href="https://github.com/opensourcedruidhills/muscovite">GitHub</a>
      <a href="mailto:muscovite-licensing@johanneslochmann.net">Contact</a>
    </div>
  </div>
  <div class="footer">© {{ now.Year }} Johannes Lochmann</div>
</body>
</html>
