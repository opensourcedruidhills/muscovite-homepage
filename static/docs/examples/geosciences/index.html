  <style>
    :root {
      --bg: #fff;
      --fg: #1d1d1d;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
      --code-bg: #f3f4f6;
      --nav-bg: #f9fafb;
      --max-width: 52rem;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --fg: #e2e8f0;
        --accent: #60a5fa;
        --accent-hover: #93bbfc;
        --border: #334155;
        --code-bg: #1e293b;
        --nav-bg: #16213e;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.7;
      color: var(--fg);
      background: var(--bg);
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    nav.breadcrumb {
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    nav.breadcrumb a { color: var(--accent); text-decoration: none; }
    nav.breadcrumb a:hover { text-decoration: underline; }
    nav.breadcrumb span.sep { margin: 0 0.4rem; color: var(--border); }
    h1 { font-size: 1.8rem; margin: 1rem 0 0.8rem; border-bottom: 2px solid var(--border); padding-bottom: 0.4rem; }
    h2 { font-size: 1.4rem; margin: 1.6rem 0 0.6rem; }
    h3 { font-size: 1.15rem; margin: 1.3rem 0 0.5rem; }
    h4, h5, h6 { font-size: 1rem; margin: 1rem 0 0.4rem; }
    p { margin: 0.6rem 0; }
    a { color: var(--accent); }
    a:hover { color: var(--accent-hover); }
    code {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }
    pre {
      background: var(--code-bg);
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.8rem 0;
      border: 1px solid var(--border);
    }
    pre code { background: none; padding: 0; font-size: 0.85em; }
    table { border-collapse: collapse; width: 100%; margin: 0.8rem 0; }
    th, td { border: 1px solid var(--border); padding: 0.5rem 0.8rem; text-align: left; }
    th { background: var(--nav-bg); font-weight: 600; }
    blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 0.8rem 0;
      color: var(--fg);
      opacity: 0.85;
    }
    ul, ol { margin: 0.5rem 0; padding-left: 1.8rem; }
    li { margin: 0.2rem 0; }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      opacity: 0.6;
    }
    .metadata { font-size: 0.85rem; color: var(--fg); opacity: 0.7; margin-bottom: 1rem; }
