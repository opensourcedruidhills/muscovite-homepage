baseURL = "https://muscovite.johanneslochmann.net/"
languageCode = "en-us"
title = "Muscovite"
theme = "PaperMod"

[params]
  description = "A declarative DDD code generation framework — write the domain model once, generate the entire stack."
  author = "Johannes Lochmann"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  env = "production"
  defaultTheme = "auto"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Muscovite"
    Content = """
**Declare your domain model. Generate the entire stack.**

Muscovite transforms `.ddd` domain models into PostgreSQL schemas, C++ services, gRPC APIs, Qt desktop clients, and CMake build systems — from a single source of truth.

11,500 lines of DSL → 55,000+ lines of production code. 9 targets. Zero manual edits.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/opensourcedruidhills/muscovite"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:muscovite-licensing@johanneslochmann.net"

  [params.assets]
    favicon = "/favicon.ico"

  [params.label]
    text = "Muscovite"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10

  [[menu.main]]
    identifier = "features"
    name = "Features"
    url = "/features/"
    weight = 20

  [[menu.main]]
    identifier = "architecture"
    name = "Architecture"
    url = "/architecture/"
